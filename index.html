<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ristorante L'Approdo</title>
    <meta name="description" content="Ristorante L'Approdo — Calasetta, Sardegna" />

    <!-- Manifest dinamico: cliente vs admin -->
    <script>
      const isAdmin = window.location.pathname.startsWith('/admin')
      const link = document.createElement('link')
      link.rel = 'manifest'
      link.href = isAdmin ? '/manifest-admin.json' : '/manifest.json'
      document.head.appendChild(link)
    </script>

    <!-- Theme color -->
    <meta name="theme-color" id="theme-color" content="#0a0a0a" />
    <script>
      if (window.location.pathname.startsWith('/admin')) {
        document.getElementById('theme-color').content = '#111111'
      }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />

    <!-- Apple PWA cliente -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="L'Approdo" />
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />

    <!-- Windows -->
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; }
      body { min-height: 100%; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
